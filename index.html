<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Mensaje para Dulce 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            position: relative;
        }

        /* Galaxy background with gradient - Darker */
        .galaxy-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(255, 20, 147, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 30%, rgba(75, 0, 130, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 70%, rgba(220, 20, 60, 0.1) 0%, transparent 50%),
                        linear-gradient(135deg, #050008 0%, #0d001a 25%, #140028 50%, #0d001a 75%, #050008 100%);
            overflow: hidden;
            z-index: 1;
        }

        /* Milky waves container */
        .milky-waves-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .milky-wave {
            position: absolute;
            opacity: 0.4;
        }

        .wave-1 {
            width: 150%;
            height: 300px;
            top: 10%;
            left: -25%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(147, 112, 219, 0.3) 25%, 
                rgba(255, 182, 193, 0.4) 50%, 
                rgba(147, 112, 219, 0.3) 75%, 
                transparent 100%);
            filter: blur(40px);
            animation: wave-flow 8s ease-in-out infinite;
            transform: skewY(-5deg);
        }

        .wave-2 {
            width: 150%;
            height: 350px;
            top: 30%;
            left: -25%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 20, 147, 0.25) 25%, 
                rgba(138, 43, 226, 0.35) 50%, 
                rgba(255, 20, 147, 0.25) 75%, 
                transparent 100%);
            filter: blur(50px);
            animation: wave-flow 10s ease-in-out infinite reverse;
            transform: skewY(5deg);
        }

        .wave-3 {
            width: 150%;
            height: 280px;
            top: 55%;
            left: -25%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(75, 0, 130, 0.3) 25%, 
                rgba(255, 105, 180, 0.4) 50%, 
                rgba(75, 0, 130, 0.3) 75%, 
                transparent 100%);
            filter: blur(45px);
            animation: wave-flow 9s ease-in-out infinite;
            transform: skewY(-4deg);
        }

        .wave-4 {
            width: 150%;
            height: 320px;
            top: 75%;
            left: -25%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(138, 43, 226, 0.25) 25%, 
                rgba(220, 20, 60, 0.35) 50%, 
                rgba(138, 43, 226, 0.25) 75%, 
                transparent 100%);
            filter: blur(55px);
            animation: wave-flow 11s ease-in-out infinite reverse;
            transform: skewY(4deg);
        }

        @keyframes wave-flow {
            0%, 100% {
                transform: translateX(0) skewY(inherit);
            }
            50% {
                transform: translateX(50px) skewY(inherit);
            }
        }

        /* Starry sky */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .star-small {
            width: 1px;
            height: 1px;
        }

        .star-medium {
            width: 2px;
            height: 2px;
        }

        .star-large {
            width: 3px;
            height: 3px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Shooting stars */
        .shooting-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 1px rgba(255, 255, 255, 0.8);
            animation: shoot 2s ease-in infinite;
        }

        @keyframes shoot {
            0% {
                opacity: 1;
                transform: translateX(0) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(300px) translateY(300px);
            }
        }

        /* Floating bunnies */
        .bunnies-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
        }

        .bunny {
            position: absolute;
            font-size: 40px;
            animation: float-bunny linear infinite;
            opacity: 0.7;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
        }

        @keyframes float-bunny {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Mega heart in center - Rotated 90 degrees */
        .mega-heart {
            position: absolute;
            width: 300px;
            height: 300px;
            z-index: 3;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            animation: heartbeat-mega 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(255, 20, 147, 0.8)) drop-shadow(0 0 80px rgba(138, 43, 226, 0.5));
        }

        .heart-shape {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 50%, #ff1493 100%);
            position: relative;
            transform: rotate(-45deg);
            border-radius: 50%;
        }

        .heart-shape::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            top: -50%;
            left: 0;
        }

        .heart-shape::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            top: 0;
            left: -50%;
        }

        @keyframes heartbeat-mega {
            0%, 100% { transform: translate(-50%, -50%) rotate(90deg) scale(1); }
            25% { transform: translate(-50%, -50%) rotate(90deg) scale(1.1); }
            50% { transform: translate(-50%, -50%) rotate(90deg) scale(1); }
        }

        /* Glowing particles around heart */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 20, 147, 0.8);
            border-radius: 50%;
            animation: float-particle 6s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(255, 105, 180, 0.8));
        }

        @keyframes float-particle {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Message container */
        .message-box {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #ff69b4;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8), inset 0 0 20px rgba(255, 105, 180, 0.3);
            max-width: 500px;
        }

        a {
            display: inline-block;
            font-size: 28px;
            font-weight: bold;
            color: #ffff00;
            text-decoration: none;
            margin: 20px 0;
            transition: all 0.3s ease;
            text-shadow: 0 0 15px rgba(255, 255, 0, 1), 0 0 30px rgba(255, 105, 180, 0.8);
        }

        a:hover {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(255, 20, 147, 1);
            transform: scale(1.1);
        }

        .hearts-emoji {
            font-size: 32px;
            margin: 0 10px;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
        }

        h1 {
            color: #ffff00;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 0, 1), 0 0 30px rgba(255, 105, 180, 0.8);
            font-weight: bold;
        }

        .subtitle {
            color: #ffffff;
            font-size: 16px;
            margin-top: 20px;
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
            font-weight: 600;
            line-height: 1.6;
        }

        .music-info {
            color: #ffff00;
            font-size: 12px;
            margin-top: 30px;
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            font-weight: 600;
        }

        .music-controls {
            margin-top: 20px;
            z-index: 20;
            position: relative;
        }

        .music-btn {
            background: rgba(255, 105, 180, 0.4);
            border: 2px solid #ffff00;
            color: #ffff00;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 255, 0, 0.8);
        }

        .music-btn:hover {
            background: rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        }
    </style>
</head>
<body>
    <!-- Galaxy background -->
    <div class="galaxy-bg"></div>

    <!-- Milky waves -->
    <div class="milky-waves-container">
        <div class="milky-wave wave-1"></div>
        <div class="milky-wave wave-2"></div>
        <div class="milky-wave wave-3"></div>
        <div class="milky-wave wave-4"></div>
    </div>

    <!-- Starry sky -->
    <div class="stars" id="starsContainer"></div>

    <!-- Shooting stars -->
    <div class="shooting-stars" id="shootingStarsContainer"></div>

    <!-- Floating bunnies -->
    <div class="bunnies-container" id="bunniesContainer"></div>

    <!-- Mega heart in center -->
    <div class="mega-heart">
        <div class="heart-shape"></div>
    </div>

    <!-- Particles around heart -->
    <div class="particles" id="particlesContainer"></div>

    <!-- Message -->
    <div class="message-box">
        <h1>✨ Para Ti, Dulce ✨</h1>
        <a href="#">
            <span class="hearts-emoji">💕</span>
            ¡Eres la niña de mis ojos!
            <span class="hearts-emoji">💕</span>
        </a>
        <p class="subtitle">Ahora cada día siento que tengo una razón por la cual darlo todo 🌹</p>
        
        <div class="music-controls">
            <button class="music-btn" id="musicToggle">🎵 Pausar música</button>
        </div>
        <p class="music-info">🎶 Self Aware - Temper City 🎶</p>
    </div>

    <!-- YouTube iframe for audio -->
    <iframe id="ytplayer" style="display:none;" width="0" height="0" src="https://www.youtube.com/embed/mh4AQkw4Jjc?autoplay=1&controls=0&start=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

    <!-- Audio element as fallback -->
    <audio id="backgroundMusic" volume="0.5" loop>
        <source src="https://www.youtube.com/watch?v=mh4AQkw4Jjc" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        // Generate random stars
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            const size = Math.random();
            
            if (size < 0.5) {
                star.className = 'star star-small';
            } else if (size < 0.8) {
                star.className = 'star star-medium';
            } else {
                star.className = 'star star-large';
            }
            
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Generate shooting stars
        const shootingStarsContainer = document.getElementById('shootingStarsContainer');
        function createShootingStar() {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            
            const startX = Math.random() * 100;
            const startY = Math.random() * 50;
            
            shootingStar.style.left = startX + '%';
            shootingStar.style.top = startY + '%';
            shootingStar.style.animationDuration = (1.5 + Math.random() * 1) + 's';
            shootingStar.style.animationDelay = Math.random() * 0.5 + 's';
            
            shootingStarsContainer.appendChild(shootingStar);
            
            setTimeout(() => shootingStar.remove(), 3000);
        }

        // Create shooting stars every 1.5 seconds
        setInterval(createShootingStar, 1500);

        // Generate floating bunnies
        const bunniesContainer = document.getElementById('bunniesContainer');
        function createBunny() {
            const bunny = document.createElement('div');
            bunny.className = 'bunny';
            bunny.textContent = '🐰';
            
            const startX = Math.random() * 100;
            const duration = 8 + Math.random() * 6;
            
            bunny.style.left = startX + '%';
            bunny.style.animationDuration = duration + 's';
            bunny.style.animationDelay = Math.random() * 2 + 's';
            
            bunniesContainer.appendChild(bunny);
            
            setTimeout(() => bunny.remove(), (duration + 2) * 1000);
        }

        // Create bunnies every 2 seconds
        setInterval(createBunny, 2000);

        // Generate particles around heart
        const particlesContainer = document.getElementById('particlesContainer');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const angle = (Math.random() * Math.PI * 2);
            const distance = 150 + Math.random() * 200;
            
            particle.style.left = '50%';
            particle.style.top = '50%';
            particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            particle.style.animationDelay = Math.random() * 6 + 's';
            
            particlesContainer.appendChild(particle);
        }

        // Music controls
        const musicToggle = document.getElementById('musicToggle');
        const ytPlayer = document.getElementById('ytplayer');
        let isPlaying = true;

        // Music toggle button
        musicToggle.addEventListener('click', function() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                ytPlayer.src = 'https://www.youtube.com/embed/mh4AQkw4Jjc?autoplay=1&controls=0';
                musicToggle.textContent = '🎵 Pausar música';
            } else {
                ytPlayer.src = '';
                musicToggle.textContent = '🎵 Reproducir música';
            }
        });

        // Allow music to play on first user interaction
        document.addEventListener('click', function() {
            ytPlayer.src = 'https://www.youtube.com/embed/mh4AQkw4Jjc?autoplay=1&controls=0';
        }, { once: true });
    </script>
</body>
</html>
